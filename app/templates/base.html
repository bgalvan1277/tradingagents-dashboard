<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TradingAgents{% endblock %} | Dashboard</title>
    <meta name="description" content="{% block meta_description %}TradingAgents multi-agent stock analysis dashboard{% endblock %}">
    <meta name="robots" content="noindex, nofollow">

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: {
                            900: '#0a0e17',
                            800: '#0f1420',
                            700: '#151c2c',
                            600: '#1c2538',
                            500: '#243044',
                        },
                        accent: {
                            blue: '#3b82f6',
                            cyan: '#06b6d4',
                        },
                        rating: {
                            buy: '#22c55e',
                            overweight: '#86efac',
                            hold: '#eab308',
                            underweight: '#f97316',
                            sell: '#ef4444',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

    <style>
        /* Hide TradingView branding */
        .tradingview-widget-copyright { display: none !important; }
        .widget-card { position: relative; }
        .widget-card::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 36px;
            height: 28px;
            background: #0f1420;
            border-radius: 6px;
            z-index: 2;
            pointer-events: none;
        }
        .tv-chart { position: relative; }
        .tv-chart::after {
            content: '';
            position: absolute;
            bottom: 28px;
            left: 4px;
            width: 36px;
            height: 28px;
            background: #0a0e17;
            border-radius: 6px;
            z-index: 2;
            pointer-events: none;
        }
        /* Base resets and dark theme */
        body {
            background-color: #0a0e17;
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(6,182,212,.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(59,130,246,.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f1420; }
        ::-webkit-scrollbar-thumb { background: #243044; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Rating badge pulse animation */
        @keyframes ratingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .rating-new { animation: ratingPulse 2s ease-in-out 3; }

        /* Smooth collapsible sections */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .collapsible-content.expanded {
            max-height: 5000px;
            opacity: 1;
            transition: max-height 0.5s ease-in, opacity 0.3s ease-in;
        }

        /* Card hover effect */
        .ticker-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }
        .ticker-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }

        /* Subtle grid line pattern for the background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Status dot animation */
        @keyframes statusPing {
            0% { transform: scale(1); opacity: 1; }
            75% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .status-dot-ping {
            animation: statusPing 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        /* Markdown content styling within reports */
        .report-content h1 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #f1f5f9; }
        .report-content h2 { font-size: 1.125rem; font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.375rem; color: #e2e8f0; }
        .report-content h3 { font-size: 1rem; font-weight: 500; margin-top: 0.5rem; margin-bottom: 0.25rem; color: #cbd5e1; }
        .report-content p { margin-bottom: 0.5rem; line-height: 1.6; color: #94a3b8; }
        .report-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .report-content li { margin-bottom: 0.25rem; color: #94a3b8; }
        .report-content strong { color: #e2e8f0; }
        .report-content code { background: #1c2538; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen grid-bg">

    <!-- Navigation -->
    {% if not hide_nav %}
    <nav class="sticky top-0 z-50 bg-surface-900/90 backdrop-blur-xl" style="border-bottom:1px solid rgba(71,85,105,.4)">
        <div style="background:linear-gradient(90deg,transparent,rgba(6,182,212,.2),transparent);height:1px;position:absolute;bottom:-1px;left:0;right:0"></div>
        <div class="px-5 sm:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- Left: Logo + nav links -->
                <div class="flex items-center gap-6">
                    <a href="/" class="flex items-center gap-2.5 group">
                        <img src="/static/logo.png" alt="TradingAgents" style="height:38px;object-fit:contain">
                    </a>

                    <div class="hidden sm:flex items-center gap-1" style="border-left:1px solid rgba(71,85,105,.3);padding-left:1rem;margin-left:.25rem">
                        <a href="/" class="px-3 py-1.5 text-sm font-medium rounded-md transition-colors
                            {% if active_page == 'dashboard' %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% else %}text-slate-400 hover:text-slate-200 hover:bg-surface-700{% endif %}">
                            Dashboard
                        </a>
                        <a href="/portfolio" class="px-3 py-1.5 text-sm font-medium rounded-md transition-colors
                            {% if active_page == 'portfolio' %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% else %}text-slate-400 hover:text-slate-200 hover:bg-surface-700{% endif %}">
                            Portfolio
                        </a>
                        <a href="/about" class="px-3 py-1.5 text-sm font-medium rounded-md transition-colors
                            {% if active_page == 'about' %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% else %}text-slate-400 hover:text-slate-200 hover:bg-surface-700{% endif %}">
                            About Us
                        </a>
                        <a href="/the-process" class="px-3 py-1.5 text-sm font-medium rounded-md transition-colors
                            {% if active_page == 'process' %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% else %}text-slate-400 hover:text-slate-200 hover:bg-surface-700{% endif %}">
                            The Process
                        </a>
                        <a href="/intelligence" class="px-3 py-1.5 text-sm font-medium rounded-md transition-colors
                            {% if active_page == 'intelligence' %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% else %}text-slate-400 hover:text-slate-200 hover:bg-surface-700{% endif %}">
                            Intelligence
                        </a>
                    </div>
                </div>

                <!-- Right: Status dot + Hamburger menu -->
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex items-center gap-2 text-xs text-slate-500">
                        <span class="relative flex h-2 w-2">
                            <span class="status-dot-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        <span>Online</span>
                    </div>
                    <div style="position:relative">
                        <button onclick="document.getElementById('navMenu').classList.toggle('nav-menu-open')" style="background:rgba(30,41,59,.6);border:1px solid rgba(71,85,105,.3);border-radius:8px;padding:7px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s" onmouseover="this.style.borderColor='rgba(6,182,212,.3)'" onmouseout="this.style.borderColor='rgba(71,85,105,.3)'">
                            <svg width="18" height="18" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                        <div id="navMenu" style="position:absolute;top:calc(100% + 8px);right:0;min-width:180px;background:rgba(15,23,42,.92);backdrop-filter:blur(20px);border:1px solid rgba(71,85,105,.35);border-radius:14px;padding:6px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .2s ease;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,.4)">
                            <a href="/history" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;color:#94a3b8;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(6,182,212,.06)';this.style.color='#e2e8f0'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">
                                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                History
                            </a>
                            <a href="/watchlist" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;color:#94a3b8;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(6,182,212,.06)';this.style.color='#e2e8f0'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">
                                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                                Watchlist
                            </a>
                            <a href="/run" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;color:#94a3b8;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(6,182,212,.06)';this.style.color='#e2e8f0'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">
                                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                Run Analysis
                            </a>
                            <a href="/status" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;color:#94a3b8;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(6,182,212,.06)';this.style.color='#e2e8f0'" onmouseout="this.style.background='transparent';this.style.color='#94a3b8'">
                                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                System
                            </a>
                            <div style="height:1px;background:rgba(71,85,105,.25);margin:4px 10px"></div>
                            <a href="/logout" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;color:#f87171;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(239,68,68,.06)'" onmouseout="this.style.background='transparent'">
                                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <style>
    .nav-menu-open{opacity:1!important;visibility:visible!important;transform:translateY(0)!important}
    </style>
    <script>document.addEventListener('click',function(e){var m=document.getElementById('navMenu');if(m&&!e.target.closest('#navMenu')&&!e.target.closest('button'))m.classList.remove('nav-menu-open')})</script>
    {% endif %}

    <!-- Main Content -->
    <main class="max-w-[1600px] mx-auto px-4 sm:px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast notifications container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // Collapsible section toggle
        function toggleSection(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                if (icon) icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('expanded');
                if (icon) icon.style.transform = 'rotate(180deg)';
            }
        }

        // Toast notification helper
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toast-container');
            const colorMap = {
                'success': 'border-green-500/50 bg-green-500/10 text-green-400',
                'error': 'border-red-500/50 bg-red-500/10 text-red-400',
                'info': 'border-blue-500/50 bg-blue-500/10 text-blue-400',
                'warning': 'border-yellow-500/50 bg-yellow-500/10 text-yellow-400',
            };
            const toast = document.createElement('div');
            toast.className = 'px-4 py-3 rounded-lg border backdrop-blur-sm text-sm transition-all duration-300 ' + (colorMap[type] || colorMap['info']);
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }

        // Listen for HTMX events
        document.body.addEventListener('htmx:responseError', function(evt) {
            showToast('Request failed. Please try again.', 'error');
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
