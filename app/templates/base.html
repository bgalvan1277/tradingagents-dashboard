<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TradingAgents{% endblock %} | Dashboard</title>
    <meta name="description" content="{% block meta_description %}TradingAgents multi-agent stock analysis dashboard{% endblock %}">
    <meta name="robots" content="noindex, nofollow">

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: {
                            900: '#0a0e17',
                            800: '#0f1420',
                            700: '#151c2c',
                            600: '#1c2538',
                            500: '#243044',
                        },
                        accent: {
                            blue: '#3b82f6',
                            cyan: '#06b6d4',
                        },
                        rating: {
                            buy: '#22c55e',
                            overweight: '#86efac',
                            hold: '#eab308',
                            underweight: '#f97316',
                            sell: '#ef4444',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

    <style>
        /* Hide TradingView branding */
        .tradingview-widget-copyright { display: none !important; }
        .widget-card { position: relative; }
        .widget-card::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 36px;
            height: 28px;
            background: #0f1420;
            border-radius: 6px;
            z-index: 2;
            pointer-events: none;
        }
        .tv-chart { position: relative; }
        .tv-chart::after {
            content: '';
            position: absolute;
            bottom: 28px;
            left: 4px;
            width: 36px;
            height: 28px;
            background: #0a0e17;
            border-radius: 6px;
            z-index: 2;
            pointer-events: none;
        }
        /* Base resets and dark theme */
        body {
            background-color: #0a0e17;
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(6,182,212,.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(59,130,246,.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f1420; }
        ::-webkit-scrollbar-thumb { background: #243044; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Rating badge pulse animation */
        @keyframes ratingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .rating-new { animation: ratingPulse 2s ease-in-out 3; }

        /* Smooth collapsible sections */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .collapsible-content.expanded {
            max-height: 5000px;
            opacity: 1;
            transition: max-height 0.5s ease-in, opacity 0.3s ease-in;
        }

        /* Card hover effect */
        .ticker-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }
        .ticker-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }

        /* Subtle grid line pattern for the background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Status dot animation */
        @keyframes statusPing {
            0% { transform: scale(1); opacity: 1; }
            75% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .status-dot-ping {
            animation: statusPing 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        /* Markdown content styling within reports */
        .report-content h1 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #f1f5f9; }
        .report-content h2 { font-size: 1.125rem; font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.375rem; color: #e2e8f0; }
        .report-content h3 { font-size: 1rem; font-weight: 500; margin-top: 0.5rem; margin-bottom: 0.25rem; color: #cbd5e1; }
        .report-content p { margin-bottom: 0.5rem; line-height: 1.6; color: #94a3b8; }
        .report-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .report-content li { margin-bottom: 0.25rem; color: #94a3b8; }
        .report-content strong { color: #e2e8f0; }
        .report-content code { background: #1c2538; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen grid-bg">

    <!-- Sidebar -->
    {% if not hide_nav %}
    <aside id="sidebar" class="sb">
        <!-- Logo -->
        <div class="sb-logo">
            <a href="/">
                <img src="/static/logo-icon.png" alt="TradingAgents" class="sb-logo-icon">
                <img src="/static/logo.png" alt="TradingAgents" class="sb-logo-full">
            </a>
        </div>

        <!-- Nav Groups -->
        <nav class="sb-nav">
            <div class="sb-group-label"><span>Main</span></div>
            <a href="/" class="sb-link {% if active_page == 'dashboard' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/portfolio" class="sb-link {% if active_page == 'portfolio' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                <span>Portfolio</span>
            </a>
            <a href="/watchlist" class="sb-link {% if active_page == 'watchlist' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                <span>Watchlist</span>
            </a>

            <div class="sb-group-label"><span>Research</span></div>
            <a href="/run" class="sb-link {% if active_page == 'run' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>Run Analysis</span>
            </a>
            <a href="/history" class="sb-link {% if active_page == 'history' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>History</span>
            </a>
            <a href="/intelligence" class="sb-link {% if active_page == 'intelligence' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                <span>Intelligence</span>
            </a>
            <a href="/simtrader" class="sb-link {% if active_page == 'simtrader' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                <span>SimTrader</span>
            </a>

            <div class="sb-group-label"><span>Info</span></div>
            <a href="/the-process" class="sb-link {% if active_page == 'process' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                <span>The Process</span>
            </a>
            <a href="/about" class="sb-link {% if active_page == 'about' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span>About Us</span>
            </a>
            <a href="/status" class="sb-link {% if active_page == 'status' %}sb-active{% endif %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span>System</span>
            </a>
        </nav>

        <!-- Bottom -->
        <div class="sb-bottom">
            <div class="sb-status">
                <span class="sb-dot"></span>
                <span>Online</span>
            </div>
            <a href="/logout" class="sb-link sb-logout">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Mobile hamburger -->
    <button class="sb-hamburger" onclick="document.getElementById('sidebar').classList.toggle('sb-open')">
        <svg width="20" height="20" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="sb-overlay" onclick="document.getElementById('sidebar').classList.remove('sb-open')"></div>

    <style>
    /* Sidebar core */
    .sb{position:fixed;top:0;left:0;bottom:0;width:64px;background:rgba(10,14,23,.95);backdrop-filter:blur(20px);border-right:1px solid rgba(71,85,105,.3);z-index:60;display:flex;flex-direction:column;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
    .sb:hover{width:220px}
    .sb:hover .sb-group-label span,.sb:hover .sb-link span,.sb:hover .sb-status span:last-child{opacity:1;transform:translateX(0)}

    /* Logo */
    .sb-logo{padding:14px 12px;border-bottom:1px solid rgba(71,85,105,.25);display:flex;align-items:center;justify-content:center;min-height:56px;flex-shrink:0}
    .sb-logo a{display:flex;align-items:center;justify-content:center}
    .sb-logo-icon{height:34px;object-fit:contain;display:block;transition:opacity .15s}
    .sb-logo-full{height:34px;object-fit:contain;display:none;transition:opacity .15s}
    .sb:hover .sb-logo-icon{display:none}
    .sb:hover .sb-logo-full{display:block}

    /* Nav */
    .sb-nav{flex:1;padding:8px 10px;overflow-y:auto;overflow-x:hidden}
    .sb-nav::-webkit-scrollbar{width:0}
    .sb-group-label{padding:16px 8px 6px;white-space:nowrap;overflow:hidden}
    .sb-group-label span{font-size:.6rem;font-weight:700;color:rgba(100,116,139,.6);text-transform:uppercase;letter-spacing:.12em;opacity:0;transform:translateX(-8px);transition:all .2s .05s}
    .sb-link{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;color:#64748b;text-decoration:none;transition:all .15s;white-space:nowrap;position:relative}
    .sb-link svg{flex-shrink:0;min-width:18px}
    .sb-link span{font-size:.82rem;font-weight:500;opacity:0;transform:translateX(-8px);transition:all .2s .05s}
    .sb-link:hover{color:#e2e8f0;background:rgba(6,182,212,.06)}
    .sb-active{color:#22d3ee!important;background:rgba(6,182,212,.08)}
    .sb-active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:#22d3ee}

    /* Bottom */
    .sb-bottom{padding:10px;border-top:1px solid rgba(71,85,105,.25);flex-shrink:0}
    .sb-status{display:flex;align-items:center;gap:8px;padding:8px 12px;white-space:nowrap}
    .sb-status span:last-child{font-size:.7rem;color:#475569;opacity:0;transform:translateX(-8px);transition:all .2s .05s}
    .sb-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.4);flex-shrink:0}
    .sb-logout{color:#f87171!important}
    .sb-logout:hover{background:rgba(239,68,68,.06)!important}

    /* Mobile */
    .sb-hamburger{display:none;position:fixed;top:12px;left:12px;z-index:70;background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border:1px solid rgba(71,85,105,.3);border-radius:10px;padding:8px;cursor:pointer}
    .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}

    @media(max-width:768px){
        .sb{width:0;border:none}
        .sb.sb-open{width:240px;border-right:1px solid rgba(71,85,105,.3)}
        .sb.sb-open .sb-group-label span,.sb.sb-open .sb-link span,.sb.sb-open .sb-status span:last-child{opacity:1;transform:translateX(0)}
        .sb-hamburger{display:flex}
        .sb.sb-open~.sb-overlay{display:block}
    }
    </style>
    {% endif %}

    <!-- Main Content -->
    <main style="{% if not hide_nav %}margin-left:64px;{% endif %}transition:margin-left .25s cubic-bezier(.4,0,.2,1);min-height:100vh;padding:1.5rem 1.5rem">
        <div style="max-width:1500px;margin:0 auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Toast notifications container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // Collapsible section toggle
        function toggleSection(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                if (icon) icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('expanded');
                if (icon) icon.style.transform = 'rotate(180deg)';
            }
        }

        // Toast notification helper
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toast-container');
            const colorMap = {
                'success': 'border-green-500/50 bg-green-500/10 text-green-400',
                'error': 'border-red-500/50 bg-red-500/10 text-red-400',
                'info': 'border-blue-500/50 bg-blue-500/10 text-blue-400',
                'warning': 'border-yellow-500/50 bg-yellow-500/10 text-yellow-400',
            };
            const toast = document.createElement('div');
            toast.className = 'px-4 py-3 rounded-lg border backdrop-blur-sm text-sm transition-all duration-300 ' + (colorMap[type] || colorMap['info']);
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }

        // Listen for HTMX events
        document.body.addEventListener('htmx:responseError', function(evt) {
            showToast('Request failed. Please try again.', 'error');
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
