{% extends "base.html" %}
{% set active_page = 'intelligence' %}

{% block title %}{{ feed_title }}{% endblock %}

{% block content %}
<a href="/intelligence" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:#64748b;text-decoration:none;margin-bottom:1rem">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to Intelligence
</a>

<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem;background:rgba(15,23,42,.55);backdrop-filter:blur(16px);border:1px solid rgba(71,85,105,.25);border-radius:20px;margin-top:.5rem">
    <div style="width:72px;height:72px;border-radius:20px;background:rgba(251,146,60,.06);border:1px solid rgba(251,146,60,.12);display:flex;align-items:center;justify-content:center;margin-bottom:24px">
        <svg width="32" height="32" fill="none" stroke="#fb923c" viewBox="0 0 24 24">{{ feed_icon | safe }}</svg>
    </div>
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:6px;background:rgba(251,146,60,.08);color:#fb923c;border:1px solid rgba(251,146,60,.12);margin-bottom:16px">Coming Soon</span>
    <h1 style="font-size:1.5rem;font-weight:800;color:#f1f5f9;margin:0 0 12px;letter-spacing:-.02em">{{ feed_title }}</h1>
    <p style="font-size:.88rem;color:#94a3b8;max-width:520px;line-height:1.7;margin:0 0 28px">{{ feed_desc }}</p>
    <a href="/intelligence" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:12px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);color:#22d3ee;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s">
        View Active Feeds
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
    </a>
</div>
{% endblock %}
