{% extends "base.html" %}
{% set active_page = 'intelligence' %}

{% block title %}Sector Rotation{% endblock %}

{% block content %}
<style>
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
@media(max-width:768px){.sector-grid{grid-template-columns:1fr}}
.sector-card{background:rgba(15,23,42,.55);backdrop-filter:blur(16px);border:1px solid rgba(71,85,105,.25);border-radius:16px;overflow:hidden}
.section-label{display:flex;align-items:center;gap:10px;margin:1.5rem 0 .75rem;font-size:.72rem;font-weight:700;color:rgba(6,182,212,.9);text-transform:uppercase;letter-spacing:.12em}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(6,182,212,.2),transparent)}
</style>

<a href="/intelligence" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:#64748b;text-decoration:none;margin-bottom:1rem">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to Intelligence
</a>
<h1 style="font-size:1.5rem;font-weight:800;color:#f1f5f9;margin:0 0 .25rem;letter-spacing:-.02em">Sector Rotation</h1>
<p style="font-size:.82rem;color:#64748b;margin:0 0 .5rem">Capital flow between sectors and relative strength analysis</p>

<div class="section-label">S&P 500 Heatmap</div>
<div class="sector-card" style="height:500px">
    <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js">
        {"exchanges":[],"dataSource":"SPX500","grouping":"sector","blockSize":"market_cap_basic","blockColor":"change","locale":"en","symbolUrl":"","colorTheme":"dark","hasTopBar":true,"isDataSet498enabled":false,"isZoomEnabled":true,"hasSymbolTooltip":true,"isMonoSize":false,"width":"100%","height":"100%"}
        </script>
    </div>
</div>

<div class="section-label">Sector Performance</div>
<div class="sector-grid">
    <div class="sector-card" style="height:400px">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js">
            {"colorTheme":"dark","dateRange":"1M","showChart":true,"locale":"en","width":"100%","height":"100%","largeChartUrl":"","isTransparent":true,"showSymbolLogo":true,"showFloatingTooltip":false,"tabs":[{"title":"Sectors","symbols":[{"s":"AMEX:XLF","d":"Financials"},{"s":"AMEX:XLK","d":"Technology"},{"s":"AMEX:XLE","d":"Energy"},{"s":"AMEX:XLV","d":"Healthcare"},{"s":"AMEX:XLY","d":"Consumer Disc."},{"s":"AMEX:XLP","d":"Consumer Staples"},{"s":"AMEX:XLI","d":"Industrials"},{"s":"AMEX:XLB","d":"Materials"},{"s":"AMEX:XLRE","d":"Real Estate"},{"s":"AMEX:XLU","d":"Utilities"},{"s":"AMEX:XLC","d":"Communication"}]}]}
            </script>
        </div>
    </div>
    <div class="sector-card" style="height:400px">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js">
            {"colorTheme":"dark","dateRange":"1M","showChart":true,"locale":"en","width":"100%","height":"100%","largeChartUrl":"","isTransparent":true,"showSymbolLogo":true,"showFloatingTooltip":false,"tabs":[{"title":"Indices","symbols":[{"s":"FOREXCOM:SPXUSD","d":"S&P 500"},{"s":"FOREXCOM:NSXUSD","d":"Nasdaq 100"},{"s":"FOREXCOM:DJI","d":"Dow Jones"},{"s":"AMEX:IWM","d":"Russell 2000"},{"s":"TVC:VIX","d":"VIX"}]}]}

        </div>

</div>
{% endblock %}
